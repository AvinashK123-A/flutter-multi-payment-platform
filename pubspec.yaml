name: flutter_multi_payment_platform
description: Enterprise multi-gateway payment platform supporting Razorpay, Stripe, and PayPal with BLoC architecture, secure token handling, and subscription management.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Payment Gateways
  razorpay_flutter: ^1.3.7
  flutter_stripe: ^10.1.1
  pay: ^2.0.0

  # Networking
  dio: ^5.3.2

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Secure Storage
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.7.4
  firebase_crashlytics: ^3.4.8

  # QR Code Scanner (payment)
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0
  intl: ^0.18.1

  # Utils
  uuid: ^4.1.0
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.1
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  shared_preferences: ^2.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  local_auth: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  mocktail: ^1.0.1
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
