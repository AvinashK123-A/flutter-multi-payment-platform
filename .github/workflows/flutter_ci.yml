# Flutter CI/CD Pipeline — flutter-multi-payment-platform
name: Flutter CI/CD

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: Analyze and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --no-pub --fatal-infos

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter test --coverage --reporter=github
      - uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

  build-android:
    name: Android (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        flavor: [ dev, qa, prod ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Setup signing
        if: matrix.flavor == 'prod'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          printf "storeFile=release.keystore
storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" > android/key.properties
      - run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --flavor ${{ matrix.flavor }} --target lib/main.dart --release
      - uses: actions/upload-artifact@v3
        with:
          name: android-${{ matrix.flavor }}
          path: build/app/outputs/flutter-apk/

  build-ios:
    name: iOS (${{ matrix.flavor }})
    runs-on: macos-14
    needs: test
    strategy:
      matrix:
        flavor: [ dev, prod ]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: cd ios && pod install --repo-update
      - run: flutter build ios --flavor ${{ matrix.flavor }} --target lib/main.dart --release --no-codesign
      - uses: actions/upload-artifact@v3
        with:
          name: ios-${{ matrix.flavor }}
          path: build/ios/

  security-audit:
    name: Payment Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - run: flutter pub audit
      - name: Check for hardcoded live payment keys
        run: |
          if grep -rn "rzp_live_" lib/ --include="*.dart" 2>/dev/null; then
            echo "ERROR: Hardcoded Razorpay live key detected!"
            exit 1
          fi
          if grep -rn "pk_live_" lib/ --include="*.dart" 2>/dev/null; then
            echo "ERROR: Hardcoded Stripe live key detected!"
            exit 1
          fi
          echo "Security check passed: No hardcoded payment keys found."
